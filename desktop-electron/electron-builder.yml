appId: com.rivercom.clawmachineadmin
productName: Claw Machine Admin
artifactName: ${productName}-${version}.${ext}
directories:
  output: dist
files:
  - main.js
  - preload.js
  - splash.html
extraResources:
  - from: ../build/electron/backend
    to: backend
  - from: ../build/electron/runtime
    to: runtime
  - from: ../packaging/windows/claw-machine-admin.png
    to: app-icon.png
  - from: ../packaging/windows/claw-machine-admin.ico
    to: app.ico
win:
  target:
    - nsis
  icon: ../packaging/windows/claw-machine-admin.ico
  signAndEditExecutable: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Claw Machine Admin
  uninstallDisplayName: Claw Machine Admin
