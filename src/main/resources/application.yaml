spring:
  application:
    name: claw-machine-backend

  datasource:
    url: jdbc:h2:file:./data/clawdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: app
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: app
    schemas: app
    create-schemas: true

  h2:
    console:
      enabled: true
      path: /h2-console