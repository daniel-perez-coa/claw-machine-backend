spring:
  application:
    name: claw-machine-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/clawdb
    username: claw_user
    password: claw_password_local
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: app
    open-in-view: false

  flyway:
    enabled: true
    default-schema: app
    schemas: app