<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: appHead('Usuarios')}">
  <title>Usuarios</title>
</head>
<body>
<div class="app">
  <div th:replace="~{fragments/sidebar :: sidebar('users')}"></div>

  <main class="content">
    <div th:replace="~{fragments/topbar :: topbar('Usuarios', 'Inicio / Usuarios')}"></div>

    <section class="page">
      <div class="page-shell users-page">

        <section class="users-header">
          <div class="page-title-banner">
            <h3 class="page-title-banner__title">Usuarios</h3>
            <p class="page-title-banner__text">
              Consulta usuarios registrados, busca por telefono y agrega puntos desde esta pantalla.
            </p>
          </div>
        </section>

        <section class="app-card users-shell">

          <div id="usersAlertContainer"></div>

          <div class="users-stack">
            <article class="users-panel users-panel--search">
              <div class="users-panel__header">
                <h3 class="users-panel__title">Buscar usuario</h3>
              </div>

              <div class="users-search">
                <div class="users-field">
                  <label class="users-field__label" for="searchPhone">Telefono</label>
                  <input class="users-field__input"
                         type="text"
                         id="searchPhone"
                         placeholder="Ej. 2211234567"
                         maxlength="10"
                         inputmode="numeric">
                </div>

                <button type="button"
                        class="users-action-button"
                        id="searchUserBtn">
                  Buscar
                </button>

              </div>
            </article>

            <article class="users-panel users-panel--points">
              <div class="users-panel__header">
                <h3 class="users-panel__title">Agregar puntos</h3>
              </div>

              <form id="addPointsForm" class="users-form">
                <div class="users-field">
                  <label class="users-field__label" for="pointsToAdd">Puntos a agregar</label>
                  <input class="users-field__input"
                         type="number"
                         id="pointsToAdd"
                         min="1"
                         step="1"
                         placeholder="Ej. 50"
                         disabled>
                </div>

                <button type="submit"
                        id="addPointsBtn"
                        class="users-submit-button"
                        disabled>
                  Agregar puntos
                </button>
              </form>
            </article>

            <div class="users-actions-row">
              <a th:href="@{/users/new}"
                      class="users-action-button users-action-button--link">
                Agregar nuevo usuario
              </a>

              <button type="button"
                      id="clearUserBtn"
                      class="users-danger-button"
                      disabled>
                Cancelar selección
              </button>

              <button type="button"
                      class="users-warning-button"
                      id="clearFiltersBtn">
                Limpiar filtros
              </button>
            </div>
          </div>

          <section class="app-card users-list-shell">
            <div class="users-list-header">
              <h3 class="users-panel__title">----- Total de usuarios registrados -----</h3>
              <button type="button"
                      id="reloadUsersBtn"
                      class="users-action-button users-action-button--small">
                Recargar
              </button>
            </div>

            <div id="usersList" class="users-list">
              <div class="empty-state">Cargando usuarios...</div>
            </div>
          </section>

        </section>
      </div>
    </section>
  </main>
</div>

<div class="modal fade" id="confirmAddPointsModal" tabindex="-1" aria-labelledby="confirmAddPointsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content users-confirm-modal">
      <div class="modal-body users-confirm-modal__body">
        <h2 id="confirmAddPointsModalLabel" class="users-confirm-modal__title">
          Usted esta a punto de ingresar <span id="confirmPointsAmount"></span> puntos al usuario: <span id="confirmUserName"></span>.
        </h2>

        <p class="users-confirm-modal__text">¿Desea continuar?</p>

        <div class="users-confirm-modal__actions">
          <button type="button"
                  id="cancelAddPointsBtn"
                  class="users-confirm-modal__button users-confirm-modal__button--cancel"
                  data-bs-dismiss="modal">
            Cancelar
          </button>

          <button type="button"
                  id="confirmAddPointsBtn"
                  class="users-confirm-modal__button users-confirm-modal__button--accept">
            Aceptar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/users.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
