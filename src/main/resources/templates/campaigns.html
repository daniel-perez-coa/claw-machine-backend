<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: appHead('Campañas')}">
    <title>Campañas</title>
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/sidebar :: sidebar('campaigns')}"></div>

    <main class="content">
        <div th:replace="~{fragments/topbar :: topbar('Campañas', 'Inicio / Campañas')}"></div>

        <section class="page">
            <div class="page-shell campaigns-page">

                <section class="campaigns-header">
                    <div class="page-title-banner">
                        <h3 class="page-title-banner__title">Campañas</h3>
                        <p class="page-title-banner__text">
                            Consulta, visualiza y actualiza las campañas registradas.
                            Usa el boton de crear para registrar una nueva campaña.
                        </p>
                    </div>

                    <div class="campaigns-create-wrapper">
                        <a th:href="@{/campaigns/new}"
                           class="campaigns-create-card"
                           aria-label="Crear campaña">
                            +
                        </a>
                    </div>
                </section>

                <section class="app-card campaigns-list-shell">
                    <div id="campaignsList" class="campaigns-list">
                        <div class="empty-state">Cargando campañas...</div>
                    </div>
                </section>

                <div id="campaignsPagination" class="reports-pagination campaigns-pagination-shell"></div>

            </div>
        </section>
    </main>
</div>

<script th:src="@{/js/campaigns.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
