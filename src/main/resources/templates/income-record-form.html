<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: appHead('Registrar ingreso')}">
    <title>Registrar ingreso</title>
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

    <main class="content">
        <div th:replace="~{fragments/topbar :: topbar('Registrar ingreso', 'Inicio / Dashboard / Registrar ingreso')}"></div>

        <section class="page">
            <div class="page-shell income-record-page">

                <section class="income-record-hero">
                    <h3 class="income-record-hero__title">Registrar ingreso</h3>
                    <p class="income-record-hero__text">
                        Captura el monto de efectivo ingresado a la campana activa.
                    </p>
                </section>

                <div id="incomeRecordAlertContainer"></div>

                <section class="app-card income-record-form-shell">
                    <form id="incomeRecordForm" class="income-record-form">

                        <div class="income-record-form__group">
                            <label for="amount" class="income-record-form__label">Monto</label>
                            <input type="number"
                                   step="0.01"
                                   min="0.01"
                                   id="amount"
                                   name="amount"
                                   class="income-record-form__input"
                                   placeholder="Ej. 150.00"
                                   required>
                        </div>

                        <div class="income-record-form__group">
                            <label for="notes" class="income-record-form__label">Notas</label>
                            <textarea id="notes"
                                      name="notes"
                                      class="income-record-form__textarea"
                                      placeholder="Observaciones opcionales"></textarea>
                        </div>

                        <div class="income-record-form__actions">
                            <button type="submit"
                                    id="submitIncomeRecordBtn"
                                    class="income-record-form__button income-record-form__button--primary">
                                Guardar ingreso
                            </button>

                            <a th:href="@{/dashboard}"
                               class="income-record-form__button income-record-form__button--secondary">
                                Cancelar
                            </a>
                        </div>

                    </form>
                </section>
            </div>
        </section>
    </main>
</div>

<script th:src="@{/js/income-record-form.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
