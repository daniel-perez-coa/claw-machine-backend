<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: appHead('Canje rapido')}">
    <title>Canje rapido</title>
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/sidebar :: sidebar('redemptions')}"></div>

    <main class="content">
        <div th:replace="~{fragments/topbar :: topbar('Canje rapido', 'Inicio / Dashboard / Canje rapido')}"></div>

        <section class="page">
            <div class="page-shell machine-expense-page">

                <section class="machine-expense-hero">
                    <h3 class="machine-expense-hero__title">Canje rapido</h3>
                    <p class="machine-expense-hero__text">
                        Registra la salida rapida de premios de la campana activa.
                        Agrega uno o varios renglones con premio y cantidad.
                    </p>
                </section>

                <div id="machineExpenseAlertContainer"></div>

                <section class="app-card machine-expense-form-shell">
                    <form class="machine-expense-form"
                          id="machineExpenseForm">

                        <div class="machine-expense-form__header">
                            <div class="machine-expense-form__col machine-expense-form__col--prize">
                                Premio
                            </div>
                            <div class="machine-expense-form__col machine-expense-form__col--quantity">
                                Cantidad
                            </div>
                            <div class="machine-expense-form__col machine-expense-form__col--actions">
                                Accion
                            </div>
                        </div>

                        <div id="expenseRows" class="machine-expense-form__rows">
                            <div class="machine-expense-row" data-index="0">
                                <div class="machine-expense-form__field machine-expense-form__field--prize">
                                    <select class="machine-expense-form__select js-prize-select">
                                        <option value="">Selecciona un premio</option>
                                    </select>
                                </div>

                                <div class="machine-expense-form__field machine-expense-form__field--quantity">
                                    <input type="number"
                                           min="1"
                                           step="1"
                                           class="machine-expense-form__input js-quantity-input"
                                           placeholder="Cantidad">
                                </div>

                                <div class="machine-expense-form__field machine-expense-form__field--actions">
                                    <button type="button"
                                            class="machine-expense-form__remove"
                                            disabled>
                                        Quitar
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="machine-expense-form__helper">
                            Cuando completes el ultimo renglon, se agregara otro automaticamente.
                        </div>

                        <div class="machine-expense-form__actions">
                            <button type="submit"
                                    id="submitMachineExpenseBtn"
                                    class="machine-expense-form__button machine-expense-form__button--primary">
                                Guardar canje
                            </button>

                            <a th:href="@{/dashboard}"
                               class="machine-expense-form__button machine-expense-form__button--secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </section>

            </div>
        </section>
    </main>
</div>

<template id="expenseRowTemplate">
    <div class="machine-expense-row" data-index="__INDEX__">
        <div class="machine-expense-form__field machine-expense-form__field--prize">
            <select class="machine-expense-form__select js-prize-select">
                <option value="">Selecciona un premio</option>
            </select>
        </div>

        <div class="machine-expense-form__field machine-expense-form__field--quantity">
            <input type="number"
                   min="1"
                   step="1"
                   class="machine-expense-form__input js-quantity-input"
                   placeholder="Cantidad">
        </div>

        <div class="machine-expense-form__field machine-expense-form__field--actions">
            <button type="button"
                    class="machine-expense-form__remove">
                Quitar
            </button>
        </div>
    </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/machine-expense-form.js}"></script>
</body>
</html>
