<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: appHead('Canjes por campana')}">
    <title>Canjes por campana</title>
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/sidebar :: sidebar('reports')}"></div>

    <main class="content">
        <div th:replace="~{fragments/topbar :: topbar('Canjes por campana', 'Inicio / Reportes / Canjes por campana')}"></div>

        <section class="page">
            <div class="page-shell reports-page">

                <section class="page-title-banner">
                    <h3 class="page-title-banner__title">Transacciones de canje</h3>
                    <p class="page-title-banner__text">
                        Visualiza todos los canjes por campana y reimprime el ticket del usuario cuando sea necesario.
                    </p>
                </section>

                <div class="reports-action-card__actions">
                    <a href="/reports"
                       class="reports-action-card__button reports-action-card__button--secondary">
                        Volver a reportes
                    </a>
                </div>

                <section class="app-card campaign-redemptions-shell">
                    <div id="campaignRedemptionsAlert" class="reports-status" aria-live="polite"></div>

                    <div class="campaign-redemptions-toolbar">
                        <div class="campaign-redemptions-field">
                            <label class="campaign-redemptions-field__label" for="campaignRedemptionsSelector">Campana</label>
                            <select id="campaignRedemptionsSelector" class="campaign-redemptions-field__control">
                                <option value="">Seleccione una campana</option>
                            </select>
                        </div>

                        <button type="button"
                                id="reloadCampaignRedemptionsBtn"
                                class="reports-action-card__button reports-action-card__button--secondary campaign-redemptions-toolbar__button">
                            Recargar canjes
                        </button>
                    </div>

                    <div id="campaignRedemptionsSummary" class="campaign-redemptions-summary"></div>
                    <div id="campaignRedemptionsList" class="campaign-redemptions-list">
                        <div class="empty-state">Seleccione una campana para consultar canjes.</div>
                    </div>
                    <div id="campaignRedemptionsPagination" class="reports-pagination"></div>
                </section>

            </div>
        </section>
    </main>
</div>

<script th:src="@{/js/report-print.js}"></script>
<script th:src="@{/js/campaign-redemptions-report.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
