<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: appHead('Nuevo premio')}">
    <title>Nuevo premio</title>
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/sidebar :: sidebar('prizes')}"></div>

    <main class="content">
        <div th:replace="~{fragments/topbar :: topbar('Nuevo premio', 'Inicio / Premios / Nuevo premio')}"></div>

        <section class="page">
            <div class="page-shell prize-form-page">

                <section class="prize-form-hero">
                    <h3 class="prize-form-hero__title">Crear premio</h3>
                    <p class="prize-form-hero__text">
                        Registra un nuevo premio indicando categoria, nombre, costo en puntos y costo real.
                    </p>
                </section>

                <div id="prizeFormAlertContainer"></div>

                <section class="app-card prize-form-shell">
                    <form id="prizeForm" class="prize-form">
                        <div class="prize-form__group">
                            <label for="prizeCategory" class="prize-form__label">Categoria</label>
                            <select id="prizeCategory" class="prize-form__select" required>
                                <option value="">Selecciona una categoria</option>
                            </select>
                        </div>

                        <div class="prize-form__group">
                            <label for="prizeName" class="prize-form__label">Nombre</label>
                            <input id="prizeName"
                                   type="text"
                                   maxlength="120"
                                   class="prize-form__input"
                                   placeholder="Ej. Audifonos inalambricos"
                                   required>
                        </div>

                        <div class="prize-form__group">
                            <label for="prizeDescription" class="prize-form__label">Descripcion</label>
                            <textarea id="prizeDescription"
                                      class="prize-form__textarea"
                                      placeholder="Descripcion opcional del premio"></textarea>
                        </div>

                        <div class="prize-form__group">
                            <label for="prizePointsCost" class="prize-form__label">Costo en puntos</label>
                            <input id="prizePointsCost"
                                   type="number"
                                   min="1"
                                   step="1"
                                   class="prize-form__input"
                                   placeholder="Ej. 300"
                                   required>
                        </div>

                        <div class="prize-form__group">
                            <label for="prizeCost" class="prize-form__label">Costo real</label>
                            <input id="prizeCost"
                                   type="number"
                                   min="0.01"
                                   step="0.01"
                                   class="prize-form__input"
                                   placeholder="Ej. 550.00"
                                   required>
                        </div>

                        <div class="prize-form__actions">
                            <button type="submit"
                                    id="submitPrizeBtn"
                                    class="prize-form__button prize-form__button--primary">
                                Crear premio
                            </button>

                            <a th:href="@{/prizes}"
                               class="prize-form__button prize-form__button--secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </section>

            </div>
        </section>
    </main>
</div>

<script th:src="@{/js/prize-form.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
