<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: appHead(${pageTitle})}">
    <title th:text="${pageTitle}">Nuevo usuario</title>
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/sidebar :: sidebar('users')}"></div>

    <main class="content">
        <div th:replace="~{fragments/topbar :: topbar(${topbarTitle}, ${topbarBreadcrumb})}"></div>

        <section class="page">
            <div class="page-shell user-form-page">

                <section class="user-form-hero">
                    <h3 class="user-form-hero__title" th:text="${heroTitle}">Crear usuario</h3>
                    <p class="user-form-hero__text" th:text="${heroText}">
                        Registra un nuevo usuario indicando su nombre y numero telefonico.
                    </p>
                </section>

                <div id="userFormAlertContainer"></div>

                <div class="user-form-layout">
                    <section class="app-card user-form-shell">
                        <div class="user-form-shell__header">
                            <h4 class="user-form-shell__title">Informacion del usuario</h4>
                            <p class="user-form-shell__text">
                                Actualiza los datos principales del usuario y guarda los cambios por separado.
                            </p>
                        </div>

                        <form id="userForm"
                              class="user-form"
                              th:attr="data-user-phone=${userPhone}">
                            <div class="user-form__group">
                                <label for="userName" class="user-form__label">Nombre</label>
                                <input id="userName"
                                       type="text"
                                       maxlength="120"
                                       class="user-form__input"
                                       placeholder="Ej. Juan Perez"
                                       pattern="[A-Za-zÁÉÍÓÚáéíóúÑñÜü ]+"
                                       inputmode="text"
                                       required>
                            </div>

                            <div class="user-form__group">
                                <label for="userPhone" class="user-form__label">Telefono</label>
                                <input id="userPhone"
                                       type="text"
                                       maxlength="10"
                                       class="user-form__input"
                                       placeholder="Ej. 2211234567"
                                       pattern="[0-9]{10}"
                                       inputmode="numeric"
                                       required>
                            </div>

                            <div class="user-form__group" th:if="${userPhone == null}">
                                <label for="confirmUserPhone" class="user-form__label">Confirmar telefono</label>
                                <input id="confirmUserPhone"
                                       type="text"
                                       maxlength="10"
                                       class="user-form__input"
                                       placeholder="Confirma el telefono"
                                       pattern="[0-9]{10}"
                                       inputmode="numeric"
                                       required>
                            </div>

                            <div class="user-form__actions">
                                <button type="submit"
                                        id="submitUserBtn"
                                        class="user-form__button user-form__button--primary"
                                        th:text="${submitLabel}">
                                    Crear usuario
                                </button>

                                <a th:href="@{/users}"
                                   class="user-form__button user-form__button--secondary"
                                   th:text="${cancelLabel}">
                                    Cancelar
                                </a>

                                <button type="button"
                                        id="deleteUserBtn"
                                        class="user-form__button user-form__button--danger"
                                        th:if="${userPhone != null}">
                                    Eliminar usuario
                                </button>
                            </div>
                        </form>
                    </section>

                    <section id="userPointsSection" class="app-card user-form-shell user-points-shell" style="display: none;">
                        <div class="user-form-shell__header">
                            <h4 class="user-form-shell__title">Modificar puntos</h4>
                            <p class="user-form-shell__text">
                                Realiza un ajuste manual del saldo del usuario con observaciones obligatorias.
                            </p>
                        </div>

                        <div class="user-points-panel">
                            <div class="user-points-panel__item">
                                <label for="userCurrentPoints" class="user-form__label">Puntos actuales</label>
                                <input id="userCurrentPoints"
                                       type="text"
                                       class="user-form__input user-form__input--readonly"
                                       readonly>
                            </div>

                            <div class="user-points-panel__item">
                                <label for="removePointsAmount" class="user-form__label">Puntos a quitar</label>
                                <input id="removePointsAmount"
                                       type="text"
                                       class="user-form__input"
                                       inputmode="numeric"
                                       placeholder="Ej. 10"
                                       maxlength="9">
                            </div>

                            <div class="user-points-panel__item">
                                <label for="removePointsNotes" class="user-form__label">Observaciones</label>
                                <textarea id="removePointsNotes"
                                          class="user-form__input user-form__textarea"
                                          rows="4"
                                          placeholder="Ingrese motivo por el cual modifica los puntos del usuario"></textarea>
                            </div>

                            <button type="button"
                                    id="removePointsBtn"
                                    class="user-form__button user-form__button--danger">
                                Quitar puntos
                            </button>
                        </div>
                    </section>
                </div>

            </div>
        </section>
    </main>
</div>

<script th:src="@{/js/user-form.js}"></script>
<script th:src="@{/js/app-confirm-modal.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
