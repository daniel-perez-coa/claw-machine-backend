<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: appHead('Premios')}">
    <title>Premios</title>
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/sidebar :: sidebar('prizes')}"></div>

    <main class="content">
        <div th:replace="~{fragments/topbar :: topbar('Premios', 'Inicio / Premios')}"></div>

        <section class="page">
            <div class="page-shell prizes-page">

                <section class="prizes-header">

                    <div class="page-title-banner">
                        <h3 class="page-title-banner__title">Premios</h3>
                        <p class="page-title-banner__text">
                            Consulta, visualiza y actualiza los premios registrados.
                            Usa el boton de crear para registrar un nuevo premio.
                        </p>
                    </div>

                    <div class="prizes-create-wrapper">
                        <a th:href="@{/prizes/new}"
                           class="prizes-create-card"
                           aria-label="Crear premio">
                            +
                        </a>
                    </div>

                </section>

                <div id="prizesAlertContainer"></div>

                <section class="app-card prizes-list-shell">
                    <div id="prizesList" class="prizes-list">
                        <div class="empty-state">Cargando premios...</div>
                    </div>
                </section>

                <div id="prizesPagination" class="reports-pagination prizes-pagination-shell"></div>

            </div>
        </section>
    </main>
</div>

<script th:src="@{/js/prizes.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
